const TAB_ORDER = [
  "Full synthetic","High mileage","Synthetic blend","Conventional",
  "Greases","Fuel treatments",
  "Spray wax","Ceramic spray","Tire & trim","Interior spray",
  "Engine oil additive","Oil stop leak","Transmission fix"
];

let currentCat = "Full synthetic";
let chartInst = null;

function toTitleCase(str) {
  return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1));
}

function buildTabs() {
  const bar = document.getElementById("tabs");
  bar.innerHTML = TAB_ORDER.map((k, i) =>
    `<button class="tab${i === 0 ? " active" : ""}" data-cat="${k}">${toTitleCase(k)}</button>`
  ).join("");
  bar.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      bar.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentCat = btn.dataset.cat;
      buildChart(currentCat);
    });
  });
}

function buildChart(catKey) {
  const cat = CATEGORIES[catKey];
  const canvas = document.getElementById("qc");
  const ctx = canvas.getContext("2d");
  if (chartInst) chartInst.destroy();

  const datasets = cat.brands.map(b => ({
    label: b.name,
    data: [{ x: b.x, y: b.y }],
    backgroundColor: b.color + "cc",
    borderColor: b.color,
    borderWidth: 1.5,
    pointRadius: 7,
    pointHoverRadius: 10,
    _note: b.note,
    _color: b.color,
  }));

  chartInst = new Chart(ctx, {
    type: "scatter",
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 250 },
      layout: { padding: { top: 22, right: 22, bottom: 12, left: 12 } },
      scales: {
        x: {
          min: 0, max: 100,
          grid: { color: "rgba(255,255,255,0.06)" },
          border: { color: "rgba(255,255,255,0.14)" },
          ticks: { display: false }
        },
        y: {
          min: 0, max: 100,
          grid: { color: "rgba(255,255,255,0.06)" },
          border: { color: "rgba(255,255,255,0.14)" },
          ticks: { display: false }
        }
      },
      plugins: { legend: { display: false }, tooltip: { enabled: false } }
    },
    plugins: [{
      id: "quadLines",
      beforeDraw(chart) {
        const { ctx, chartArea: { left, right, top, bottom } } = chart;
        const mx = (left + right) / 2, my = (top + bottom) / 2;
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.16)";
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 4]);
        ctx.beginPath(); ctx.moveTo(mx, top); ctx.lineTo(mx, bottom); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(left, my); ctx.lineTo(right, my); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      },
      afterDraw(chart) {
        const { ctx, scales: { x, y } } = chart;
        ctx.save();
        chart.data.datasets.forEach(ds => {
          const pt = ds.data[0];
          const px = x.getPixelForValue(pt.x);
          const py = y.getPixelForValue(pt.y);
          ctx.fillStyle = "#cecece";
          ctx.font = "10.5px system-ui, sans-serif";
          ctx.textAlign = pt.x > 50 ? "right" : "left";
          const ox = pt.x > 50 ? -11 : 11;
          const oy = pt.y > 50 ? -11 : 16;
          ctx.fillText(ds.label, px + ox, py + oy);
        });
        ctx.restore();
      }
    }]
  });

  canvas.onmousemove = function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const tip = document.getElementById("tip");
    let found = false;
    chartInst.data.datasets.forEach((ds, i) => {
      const meta = chartInst.getDatasetMeta(i);
      if (meta.data[0]) {
        const el = meta.data[0];
        const dx = el.x - mx, dy = el.y - my;
        if (Math.sqrt(dx * dx + dy * dy) < 14) {
          tip.style.display = "block";
          tip.style.left = (mx + 16) + "px";
          tip.style.top = Math.max(0, my - 12) + "px";
          tip.innerHTML = `<strong style="color:${ds._color}">${ds.label}</strong><br><span style="color:#999;font-size:10px;">${ds._note}</span>`;
          found = true;
        }
      }
    });
    if (!found) tip.style.display = "none";
  };
  canvas.onmouseleave = () => { document.getElementById("tip").style.display = "none"; };

  // Legend
  document.getElementById("legend").innerHTML = cat.brands.map(b =>
    `<div class="legend-item"><div class="legend-dot" style="background:${b.color}"></div><span>${b.name}</span></div>`
  ).join("");

  // Source note
  document.getElementById("sourceNote").textContent = cat.source;
}

buildTabs();
buildChart(currentCat);
</script>
